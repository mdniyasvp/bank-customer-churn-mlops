name: Bank Churn CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          pwd
          ls
          ls -R

      - name: Verify Dataset
        run: |
          echo "Checking data folder..."
          ls -lh data
          ls -lh data/raw

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: uv sync

      - name: Train Model
        run: uv run python -m src.models.train

      - name: Run Tests
        run: uv run pytest -v

      - name: Build Docker Image
        run: docker build -t bank-churn-api .